<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Analysis Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 5px; padding: 0; }
        .container { max-width: 100%; margin: 0; }
        #summaryCards { display: flex; gap: 5px; margin-bottom: 5px; }
        .card { padding: 5px; border: 1px solid #ccc; border-radius: 3px; }
        table { border-collapse: collapse; margin-top: 5px; }
        th { background-color: #f0f0f0; font-weight: bold; padding: 3px 8px; text-align: left; border-bottom: 2px solid #999; font-size: 13px; }
        td { padding: 2px 8px; text-align: left; border-bottom: 1px solid #ddd; font-size: 13px; }
        td.num { text-align: right; font-family: monospace; padding: 2px 4px; width: auto; }
        h1 { margin: 0; padding: 0; font-size: 18px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Data Analysis Dashboard</h1>
        
        <div id="summaryCards"></div>
        <div style="margin: 5px 0; display: flex; gap: 8px; align-items: center; flex-wrap: wrap;">
            <input type="text" id="filterInput" placeholder="Filter by name..." style="padding: 4px 6px; width: 200px; font-size: 13px;">
            <select id="sortSelect" style="padding: 4px 6px; font-size: 13px;">
                <option value="none">No Sort</option>
                <option value="nameAsc">Name (A-Z)</option>
                <option value="gdpDesc">GDP (High to Low)</option>
            </select>
            <button onclick="applyFilterSort()" style="padding: 4px 10px; cursor: pointer; font-size: 13px;">Filter & Sort</button>
            <button onclick="resetTable()" style="padding: 4px 10px; cursor: pointer; font-size: 13px;">Reset</button>
        </div>
        <div id="rowCount" style="margin: 2px 0; padding: 0; font-size: 13px;">Rows: 0</div>
        
        <table id="dataTable">
            <thead>
                <tr id="tableHeader"></tr>
            </thead>
            <tbody id="tableBody">
            </tbody>
        </table>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script>
        // Global dataset variable
        let RAW_DATA = [];
        window.DS = [];

        // TASK A: loadDataset()
        function loadDataset() {
            // Copy RAW_DATA into window.DS using spread operator
            window.DS = [...RAW_DATA];

            // Call renderTable with the dataset
            renderTable(window.DS);

            // Call renderSummaryCards with the dataset
            renderSummaryCards(window.DS);

            // Call onDataReady for Student 2's code initialization
            onDataReady();

            // Update #rowCount text
            document.getElementById('rowCount').textContent = `Rows: ${window.DS.length}`;
        }

        // Fetch and parse Kaggle dataset from CSV
        async function fetchKaggleDataset() {
            try {
                // Replace this URL with your Kaggle dataset CSV URL or use a local file
                const csvUrl = 'data.csv'; // Change to your CSV file path or public URL
                
                const response = await fetch(csvUrl);
                const csvText = await response.text();

                // Parse CSV using PapaParse
                Papa.parse(csvText, {
                    header: true,
                    dynamicTyping: true,
                    skipEmptyLines: true,
                    complete: function(results) {
                        RAW_DATA = results.data;
                        console.log('Dataset loaded:', RAW_DATA.length, 'rows');
                        loadDataset();
                    },
                    error: function(error) {
                        console.error('Error parsing CSV:', error);
                    }
                });
            } catch (error) {
                console.error('Error fetching dataset:', error);
            }
        }

        // Placeholder functions for Student 2
        function renderTable(data) {
            const tableBody = document.getElementById('tableBody');
            
            // Clear existing table rows
            tableBody.innerHTML = '';

            // Show "No results" row if data is empty
            if (!data || data.length === 0) {
                const noResultsRow = document.createElement('tr');
                noResultsRow.innerHTML = '<td colspan="100%">No results</td>';
                tableBody.appendChild(noResultsRow);
                return;
            }

            // Get column headers from first row
            const headers = Object.keys(data[0]);

            // Build header row if not already present
            const headerRow = document.getElementById('tableHeader');
            if (headerRow.children.length === 0) {
                headers.forEach(header => {
                    const th = document.createElement('th');
                    th.textContent = header;
                    headerRow.appendChild(th);
                });
            }

            // Build table rows from data
            data.forEach(row => {
                const tr = document.createElement('tr');
                
                headers.forEach(header => {
                    const td = document.createElement('td');
                    let value = row[header];
                    
                    // Trim whitespace and convert to proper type
                    if (typeof value === 'string') {
                        value = value.trim();
                        // Convert Rank to number
                        if (header === 'Rank') {
                            value = parseInt(value, 10);
                        }
                    }
                    
                    td.textContent = value;

                    // Apply 'num' class to Rank and GDP columns
                    if (header === 'Rank' || header === 'GDP' || typeof value === 'number') {
                        td.classList.add('num');
                    }

                    tr.appendChild(td);
                });

                tableBody.appendChild(tr);
            });
        }

        function renderSummaryCards(data) {
            // Student 2 should implement this
            console.log('renderSummaryCards called with', data.length, 'rows');
        }

        function onDataReady() {
            // Student 2 should implement this
            console.log('onDataReady called - data is ready for processing');
        }

        // TASK C: applyFilterSort()
        function applyFilterSort() {
            const filterText = document.getElementById('filterInput').value.toLowerCase();
            const sortOption = document.getElementById('sortSelect').value;

            // Filter data by country name (case-insensitive)
            let filtered = window.DS.filter(item => {
                const nameField = String(item.CountryName || '').toLowerCase();
                return nameField.includes(filterText);
            });

            // Sort based on selected option
            let sorted = [...filtered];
            if (sortOption === 'nameAsc') {
                sorted.sort((a, b) => {
                    const nameA = String(a.CountryName || '').toUpperCase();
                    const nameB = String(b.CountryName || '').toUpperCase();
                    return nameA.localeCompare(nameB);
                });
            } else if (sortOption === 'gdpDesc') {
                sorted.sort((a, b) => {
                    const gdpA = parseFloat(String(a.GDP || 0).replace(/[^0-9.-]/g, ''));
                    const gdpB = parseFloat(String(b.GDP || 0).replace(/[^0-9.-]/g, ''));
                    return gdpB - gdpA;
                });
            }

            // Render filtered and sorted table
            renderTable(sorted);

            // Update row count
            document.getElementById('rowCount').textContent = `Rows: ${sorted.length}`;
        }

        // TASK D: resetTable()
        function resetTable() {
            // Clear filter input
            document.getElementById('filterInput').value = '';

            // Reset sort select
            document.getElementById('sortSelect').value = 'none';

            // Render original dataset
            renderTable(window.DS);

            // Update row count
            document.getElementById('rowCount').textContent = `Rows: ${window.DS.length}`;
        }

        // Load dataset on page load
        window.addEventListener('load', fetchKaggleDataset);
    </script>
</body>
</html>
