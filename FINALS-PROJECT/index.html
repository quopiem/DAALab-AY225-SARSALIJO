<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Analysis Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Data Analysis Dashboard</h1>
        
        <div id="summaryCards"></div>
        <div class="filter-sort-section">
            <input type="text" id="filterInput" placeholder="Filter by name...">
            <select id="sortSelect">
                <option value="none">No Sort</option>
                <option value="nameAsc">Name (A-Z)</option>
                <option value="gdpDesc">GDP (High to Low)</option>
            </select>
            <button onclick="applyFilterSort()">Filter & Sort</button>
            <button onclick="resetTable()">Reset</button>
        </div>
        <div id="rowCount">Rows: 0</div>
        
        <table id="dataTable">
            <thead>
                <tr id="tableHeader"></tr>
            </thead>
            <tbody id="tableBody">
            </tbody>
        </table>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script>
        // Global dataset variable
        let RAW_DATA = [];
        window.DS = [];

        // TASK A: loadDataset()
        function loadDataset() {
            // Copy RAW_DATA into window.DS using spread operator
            window.DS = [...RAW_DATA];

            // Call renderTable with the dataset
            renderTable(window.DS);

            // Call renderSummaryCards with the dataset
            renderSummaryCards(window.DS);

            // Call onDataReady for Student 2's code initialization
            onDataReady();

            // Update #rowCount text
            document.getElementById('rowCount').textContent = `Rows: ${window.DS.length}`;
        }

        // Fetch and parse Kaggle dataset from CSV
        async function fetchKaggleDataset() {
            try {
                // Replace this URL with your Kaggle dataset CSV URL or use a local file
                const csvUrl = 'data.csv'; // Change to your CSV file path or public URL
                
                const response = await fetch(csvUrl);
                const csvText = await response.text();

                // Parse CSV using PapaParse
                Papa.parse(csvText, {
                    header: true,
                    dynamicTyping: true,
                    skipEmptyLines: true,
                    complete: function(results) {
                        RAW_DATA = results.data;
                        console.log('Dataset loaded:', RAW_DATA.length, 'rows');
                        loadDataset();
                    },
                    error: function(error) {
                        console.error('Error parsing CSV:', error);
                    }
                });
            } catch (error) {
                console.error('Error fetching dataset:', error);
            }
        }

        // Placeholder functions for Student 2
        function renderTable(data) {
            const tableBody = document.getElementById('tableBody');
            
            // Clear existing table rows
            tableBody.innerHTML = '';

            // Show "No results" row if data is empty
            if (!data || data.length === 0) {
                const noResultsRow = document.createElement('tr');
                noResultsRow.innerHTML = '<td colspan="100%">No results</td>';
                tableBody.appendChild(noResultsRow);
                return;
            }

            // Get column headers from first row
            const headers = Object.keys(data[0]);

            // Build header row if not already present
            const headerRow = document.getElementById('tableHeader');
            if (headerRow.children.length === 0) {
                headers.forEach(header => {
                    const th = document.createElement('th');
                    th.textContent = header;
                    headerRow.appendChild(th);
                });
            }

            // Build table rows from data
            data.forEach(row => {
                const tr = document.createElement('tr');
                
                headers.forEach(header => {
                    const td = document.createElement('td');
                    let value = row[header];
                    
                    // Trim whitespace and convert to proper type
                    if (typeof value === 'string') {
                        value = value.trim();
                        // Convert Rank to number
                        if (header === 'Rank') {
                            value = parseInt(value, 10);
                        }
                    }
                    
                    td.textContent = value;

                    // Apply 'num' class to Rank and GDP columns
                    if (header === 'Rank' || header === 'GDP' || typeof value === 'number') {
                        td.classList.add('num');
                    }

                    tr.appendChild(td);
                });

                tableBody.appendChild(tr);
            });
        }

        function renderSummaryCards(data) {
            const container = document.getElementById('summaryCards');
            container.innerHTML = '';

            if (!data || data.length === 0) {
                return;
            }

            // Calculate statistics
            const gdpValues = data.map(d => parseFloat(String(d.GDP || 0).replace(/[^0-9.-]/g, ''))).filter(v => !isNaN(v));
            const avgGDP = gdpValues.length > 0 ? (gdpValues.reduce((a, b) => a + b, 0) / gdpValues.length).toFixed(0) : 0;
            
            const highestGDPCountry = data.reduce((max, curr) => {
                const currGDP = parseFloat(String(curr.GDP || 0).replace(/[^0-9.-]/g, ''));
                const maxGDP = parseFloat(String(max.GDP || 0).replace(/[^0-9.-]/g, ''));
                return currGDP > maxGDP ? curr : max;
            });

            const totalCountries = data.length;

            const topRankedCountry = data.reduce((best, curr) => {
                const currRank = parseInt(curr.Rank || 999);
                const bestRank = parseInt(best.Rank || 999);
                return currRank < bestRank ? curr : best;
            });

            // Create summary cards
            const cards = [
                { title: 'Avg GDP', value: `$${parseInt(avgGDP).toLocaleString()}` },
                { title: 'Highest GDP', value: highestGDPCountry.CountryName },
                { title: 'Total Countries', value: totalCountries },
                { title: 'Top Ranked', value: topRankedCountry.CountryName }
            ];

            cards.forEach(card => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `<div class="card-label">${card.title}</div><div class="card-value">${card.value}</div>`;
                container.appendChild(div);
            });
        }

        function onDataReady() {
            // Student 2 should implement this
            console.log('onDataReady called - data is ready for processing');
        }

        // TASK C: applyFilterSort()
        function applyFilterSort() {
            const filterText = document.getElementById('filterInput').value.toLowerCase();
            const sortOption = document.getElementById('sortSelect').value;

            // Filter data by country name (case-insensitive)
            let filtered = window.DS.filter(item => {
                const nameField = String(item.CountryName || '').toLowerCase();
                return nameField.includes(filterText);
            });

            // Sort based on selected option
            let sorted = [...filtered];
            if (sortOption === 'nameAsc') {
                sorted.sort((a, b) => {
                    const nameA = String(a.CountryName || '').toUpperCase();
                    const nameB = String(b.CountryName || '').toUpperCase();
                    return nameA.localeCompare(nameB);
                });
            } else if (sortOption === 'gdpDesc') {
                sorted.sort((a, b) => {
                    const gdpA = parseFloat(String(a.GDP || 0).replace(/[^0-9.-]/g, ''));
                    const gdpB = parseFloat(String(b.GDP || 0).replace(/[^0-9.-]/g, ''));
                    return gdpB - gdpA;
                });
            }

            // Render filtered and sorted table
            renderTable(sorted);

            // Update row count
            document.getElementById('rowCount').textContent = `Rows: ${sorted.length}`;
        }

        // TASK D: resetTable()
        function resetTable() {
            // Clear filter input
            document.getElementById('filterInput').value = '';

            // Reset sort select
            document.getElementById('sortSelect').value = 'none';

            // Render original dataset
            renderTable(window.DS);

            // Update row count
            document.getElementById('rowCount').textContent = `Rows: ${window.DS.length}`;
        }

        // Load dataset on page load
        window.addEventListener('load', fetchKaggleDataset);
    </script>
      // Cleanup script
        <script>
    function isValidRow(row) {
        const name = String(row.CountryName || row.name || '').trim();
        const gdp = parseFloat(String(row.GDP ?? row.score ?? '').replace(/[^0-9.-]/g, ''));
        const rank = parseInt(String(row.Rank ?? '').replace(/[^0-9.-]/g, ''), 10);

        return name !== '' && Number.isFinite(gdp) && !Number.isNaN(rank);
    }

    function cleanData(data) {
        return data.filter(isValidRow);
    }

    function onDataReady() {
        const cleaned = cleanData(window.DS);

        // Use cleaned data only for charts and analysis
        initCharts(cleaned);
        renderAnalysis(cleaned);
        renderInsights(cleaned);
    }

    function initCharts(data) {
        drawBarChart('barChart', data);
        drawScatterPlot('scatterPlot', data);
        drawDoughnut('doughnutChart', data);
    }
    </script>
    // category splitting
    <script>
const INCOME_GROUPS = {
    WLD: 'World',
    HIC: 'High income',
    UMC: 'Upper middle income',
    LMC: 'Lower middle income',
    LIC: 'Low income'
};

const REGIONS = {
    EAS: 'East Asia & Pacific',
    ECS: 'Europe & Central Asia',
    LCN: 'Latin America & Caribbean',
    MEA: 'Middle East & North Africa',
    NAC: 'North America',
    SAS: 'South Asia',
    SSF: 'Sub-Saharan Africa'
};

const SPECIAL_TERRITORIES = {
    HKG: 'Hong Kong SAR, China',
    MAC: 'Macao SAR, China',
    PRI: 'Puerto Rico',
    GUM: 'Guam',
    IMN: 'Isle of Man'
};

function getCode(row) {
    return String(row.Code || row.code || row.countryCode || row.CountryCode || '').trim().toUpperCase();
}

function getCategory(row) {
    const code = getCode(row);

    if (INCOME_GROUPS[code]) return { type: 'income', label: INCOME_GROUPS[code] };
    if (REGIONS[code]) return { type: 'region', label: REGIONS[code] };
    if (SPECIAL_TERRITORIES[code]) return { type: 'special', label: SPECIAL_TERRITORIES[code] };

    return { type: 'country', label: String(row.CountryName || row.name || '').trim() };
}

function splitByCategory(data) {
    const grouped = {
        income: {},
        region: {},
        special: {},
        country: {}
    };

    data.forEach(row => {
        const gdp = parseFloat(String(row.GDP ?? row.score ?? '').replace(/[^0-9.-]/g, ''));
        if (!Number.isFinite(gdp)) return;

        const cat = getCategory(row);
        if (!grouped[cat.type][cat.label]) {
            grouped[cat.type][cat.label] = [];
        }
        grouped[cat.type][cat.label].push(row);
    });

    return grouped;
}
</script>
// data prep helpers for chart
<script>
function getGDP(row) {
    return parseFloat(String(row.GDP ?? row.gdp ?? row.value ?? '')
        .replace(/[^0-9.-]/g, ''));
}

function getCountryName(row) {
    return String(row.CountryName ?? row.name ?? row.Country ?? '')
        .trim();
}

function getValidEconomicRows(data) {
    return data.filter(row => {
        const name = getCountryName(row);
        const gdp = getGDP(row);
        return name && Number.isFinite(gdp);
    });
}

function getTopNByGDP(data, n = 10) {
    return [...getValidEconomicRows(data)]
        .sort((a, b) => getGDP(b) - getGDP(a))
        .slice(0, n);
}

function getAllByGDP(data) {
    return [...getValidEconomicRows(data)]
        .sort((a, b) => getGDP(b) - getGDP(a));
}
</script>
</body>
</html>
